# Production overlay — adds nginx reverse proxy with SSL.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Place SSL certs at nginx/ssl/parliament.crt and nginx/ssl/parliament.key
#   2. Set DEBUG=False and proper ALLOWED_HOSTS in .env

services:
  web:
    ports: []        # remove direct host binding
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/ssl/certs:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web
