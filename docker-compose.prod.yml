# Production overlay — HTTP intranet deployment (no SSL).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   1. Set DEBUG=False, ALLOWED_HOSTS, and CSRF_TRUSTED_ORIGINS in .env
#   2. Set a strong SECRET_KEY and POSTGRES_PASSWORD in .env

services:
  web:
    ports: []
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py create_groups &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  celery:
    volumes:
      - media_data:/app/media

  celery-beat:
    volumes:
      - media_data:/app/media

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web
