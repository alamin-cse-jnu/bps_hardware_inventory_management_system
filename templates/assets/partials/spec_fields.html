{% if spec_fields %}
<div class="card" style="margin-bottom:20px">
  <div style="padding:16px 20px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:8px">
    <svg width="16" height="16" fill="none" stroke="#0076A7" stroke-width="2" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    <h3 style="font-size:14px;font-weight:700;color:#212529">Specifications</h3>
  </div>
  <div class="card-body">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      {% for key, value in spec_fields %}
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">{{ key|upper }}</label>
        <input type="text" name="spec_{{ key }}" value="{{ value }}" class="form-input" placeholder="{{ key }}">
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endif %}
