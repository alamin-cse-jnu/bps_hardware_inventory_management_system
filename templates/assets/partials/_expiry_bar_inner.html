<div style="background:{{ bg }};border-radius:6px;padding:8px 10px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
    <span style="font-size:12px;font-weight:700;color:{{ text_color }}">
      {% if info.status == 'expired' %}
        Expired {{ info.days_left|cut:"-" }} day{{ info.days_left|cut:"-"|pluralize }} ago
      {% elif info.days_left == 0 %}
        Expires today
      {% elif info.days_left == 1 %}
        1 day left
      {% else %}
        {{ info.days_left }} days left
      {% endif %}
    </span>
    <span style="font-size:11px;color:{{ text_color }};opacity:.75">{{ info.expiry|date:"d M Y" }}</span>
  </div>
  <div style="height:6px;border-radius:99px;background:rgba(0,0,0,.08);overflow:hidden">
    <div style="height:100%;width:{{ info.pct }}%;background:{{ bar_color }};border-radius:99px;transition:width .3s ease"></div>
  </div>
</div>
