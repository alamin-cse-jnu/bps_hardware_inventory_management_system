<div class="panel-overlay">
  <div class="panel-backdrop" onclick="document.getElementById('panel-container').innerHTML=''; window.location.reload()"></div>
  <div class="panel-drawer">

    <div class="panel-header">
      <div style="font-size:15px;font-weight:700;color:#212529">Alert Updated</div>
      <button type="button"
              onclick="document.getElementById('panel-container').innerHTML=''; window.location.reload()"
              style="width:30px;height:30px;border:1px solid #E5E7EB;border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" fill="none" stroke="#495057" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="panel-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 24px">
      {% if action == 'resolve' %}
      <div style="width:56px;height:56px;border-radius:50%;background:#ECFDF5;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
        <svg width="26" height="26" fill="none" stroke="#059669" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="font-size:17px;font-weight:700;color:#212529;margin-bottom:6px">Alert Resolved</div>
      <div style="font-size:13.5px;color:#6C757D;max-width:300px;line-height:1.5">
        The alert for <strong>{{ alert.assignee.display_name }}</strong> has been marked as resolved.
      </div>
      {% else %}
      <div style="width:56px;height:56px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
        <svg width="26" height="26" fill="none" stroke="#9CA3AF" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
      </div>
      <div style="font-size:17px;font-weight:700;color:#212529;margin-bottom:6px">Alert Dismissed</div>
      <div style="font-size:13.5px;color:#6C757D;max-width:300px;line-height:1.5">
        The alert for <strong>{{ alert.assignee.display_name }}</strong> has been dismissed.
      </div>
      {% endif %}

      {% if alert.note %}
      <div style="margin-top:16px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:12px 16px;font-size:12.5px;color:#495057;max-width:320px;text-align:left">
        <div style="font-size:10.5px;font-weight:700;color:#9CA3AF;text-transform:uppercase;margin-bottom:4px">Note</div>
        {{ alert.note }}
      </div>
      {% endif %}
    </div>

    <div class="panel-footer">
      <button type="button"
              onclick="document.getElementById('panel-container').innerHTML=''; window.location.reload()"
              class="btn btn-primary" style="flex:1">Close</button>
    </div>

  </div>
</div>
