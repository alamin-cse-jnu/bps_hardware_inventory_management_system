<div class="panel-overlay">
  <div class="panel-backdrop" onclick="document.getElementById('panel-container').innerHTML=''"></div>
  <div class="panel-drawer">

    <div class="panel-header">
      <div>
        <div style="font-size:15px;font-weight:700;color:#212529">Return to Stock</div>
        <div class="asset-tag" style="font-size:11.5px;margin-top:1px">{{ asset.asset_tag }}</div>
      </div>
      <button type="button"
              onclick="document.getElementById('panel-container').innerHTML=''"
              style="width:30px;height:30px;border:1px solid #E5E7EB;border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" fill="none" stroke="#495057" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="panel-body">
      {% if error %}
      <div class="callout callout-red" style="margin-bottom:16px">
        <svg width="15" height="15" fill="none" stroke="#EF4444" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div style="color:#991B1B;font-size:13px;line-height:1.5">{{ error }}</div>
      </div>
      {% endif %}

      <div class="callout callout-gold" style="margin-bottom:20px">
        <svg width="15" height="15" fill="none" stroke="#C8A951" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div style="color:#78350F;font-size:13px;line-height:1.5">
          The current assignment will be closed and the asset status set to <strong>In Stock</strong>.
        </div>
      </div>

      <div style="background:#F8F9FA;border:1px solid #E5E7EB;border-radius:6px;padding:14px 16px;margin-bottom:20px">
        <div class="text-small" style="font-weight:600;color:#6C757D;margin-bottom:4px">Asset</div>
        <div style="font-weight:700"><span class="asset-tag">{{ asset.asset_tag }}</span></div>
        <div class="text-muted text-small">{{ asset.brand }} {{ asset.model_name }}</div>
      </div>

      <form id="return-form"
            hx-post="{% url 'assignments:return_panel' asset.pk %}"
            hx-target="#panel-container"
            hx-swap="innerHTML">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">
            Return Note
            <span style="font-weight:400;color:#9CA3AF">(optional)</span>
          </label>
          <textarea name="notes" rows="3" class="form-input"
                    placeholder="e.g. Returned after workstation replacement"></textarea>
        </div>
      </form>
    </div>

    <div class="panel-footer">
      <button type="button"
              onclick="document.getElementById('panel-container').innerHTML=''"
              class="btn btn-outline" style="flex:1">Cancel</button>
      <button type="submit" form="return-form" class="btn btn-danger-soft" style="flex:1">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
        Confirm Return
      </button>
    </div>

  </div>
</div>
