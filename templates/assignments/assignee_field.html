<div id="assignee-field">
  <!-- ── Step 1: Type picker ── -->
  <div id="af-type-picker" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">

    <button type="button" id="af-btn-EMPLOYEE" onclick="afSelectType('EMPLOYEE','Employee')"
            style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border:1.5px solid #E5E7EB;border-radius:8px;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:all 150ms">
      <svg width="20" height="20" fill="none" stroke="#0076A7" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span style="font-size:11.5px;font-weight:600;color:#374151">Employee</span>
    </button>

    <button type="button" id="af-btn-MP" onclick="afSelectType('MP','MP')"
            style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border:1.5px solid #E5E7EB;border-radius:8px;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:all 150ms">
      <svg width="20" height="20" fill="none" stroke="#0076A7" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span style="font-size:11.5px;font-weight:600;color:#374151">MP</span>
    </button>

    <button type="button" id="af-btn-OFFICE" onclick="afSelectType('OFFICE','Office')"
            style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border:1.5px solid #E5E7EB;border-radius:8px;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:all 150ms">
      <svg width="20" height="20" fill="none" stroke="#0076A7" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      <span style="font-size:11.5px;font-weight:600;color:#374151">Office</span>
    </button>

    <button type="button" id="af-btn-LOCATION" onclick="afSelectType('LOCATION','Location')"
            style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border:1.5px solid #E5E7EB;border-radius:8px;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:all 150ms">
      <svg width="20" height="20" fill="none" stroke="#0076A7" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span style="font-size:11.5px;font-weight:600;color:#374151">Location</span>
    </button>

  </div>

  <!-- ── Step 2: Search (shown after type selected) ── -->
  <div id="af-search-section" style="display:none;margin-top:12px">

    <!-- Active type chip + change button + hint -->
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <svg width="13" height="13" fill="none" stroke="#0076A7" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      <span id="af-type-chip" style="display:inline-flex;align-items:center;gap:5px;padding:3px 12px;border-radius:99px;background:#E8F3F8;color:#0076A7;font-size:12px;font-weight:700;border:1px solid #BFDBFE"></span>
      <button type="button" onclick="afClearType()"
              style="background:none;border:none;cursor:pointer;padding:3px 8px;border-radius:4px;font-size:11.5px;color:#9CA3AF;font-family:'Inter',sans-serif;transition:background 150ms"
              onmouseover="this.style.background='#F3F4F6'" onmouseout="this.style.background='none'"
              title="Change type">
        Change
      </button>
    </div>
    <div id="af-search-hint" style="font-size:11px;color:#9CA3AF;margin-bottom:8px"></div>

    <!-- Search box + results dropdown -->
    <div style="position:relative">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;z-index:1">
        <svg width="14" height="14" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="hidden" id="af-holder-type" name="holder_type" value="">

      <input id="af-search-input"
             name="q"
             class="form-input"
             style="padding-left:34px"
             placeholder="Type to search…"
             autocomplete="off"
             hx-get="{% url 'assignees:search' %}?asset_pk={{ asset.pk }}"
             hx-include="#af-holder-type"
             hx-trigger="input delay:100ms, af-type-changed from:body"
             hx-target="#af-search-results"
             hx-swap="innerHTML"
             hx-indicator="#af-spinner">

      <span id="af-spinner" class="htmx-indicator" style="position:absolute;right:10px;top:50%;transform:translateY(-50%)">
        <svg width="14" height="14" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24" style="animation:af-spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0"/></svg>
      </span>

      <div id="af-search-results"
           style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #E5E7EB;border-radius:6px;z-index:30;box-shadow:0 4px 20px rgba(0,0,0,.12);max-height:260px;overflow-y:auto">
      </div>
    </div>
  </div>
</div>

<style>
@keyframes af-spin { to { transform: translateY(-50%) rotate(360deg) } }
#af-type-picker button:hover { border-color:#0076A7; background:#F0F9FF }
</style>

<script>
var _afPlaceholders = {
  'EMPLOYEE': 'Name or PRP ID…',
  'MP':       'Name, PRP ID or constituency…',
  'OFFICE':   'Office name…',
  'LOCATION': 'Location name…',
};
var _afHints = {
  'EMPLOYEE': 'Search by name or PRP employee ID',
  'MP':       'Search by name, PRP ID or constituency',
  'OFFICE':   'Search by office / department name',
  'LOCATION': 'Search by building, floor or room',
};

function afSelectType(typeVal, typeLabel) {
  document.getElementById('af-holder-type').value = typeVal;
  document.getElementById('af-type-chip').textContent = typeLabel;
  document.getElementById('af-search-section').style.display = 'block';
  // Update hint text
  var hintEl = document.getElementById('af-search-hint');
  if (hintEl) hintEl.textContent = _afHints[typeVal] || '';
  ['EMPLOYEE','MP','OFFICE','LOCATION'].forEach(function(t) {
    var btn = document.getElementById('af-btn-' + t);
    if (!btn) return;
    if (t === typeVal) {
      btn.style.borderColor = '#0076A7';
      btn.style.background = '#E8F3F8';
    } else {
      btn.style.borderColor = '#E5E7EB';
      btn.style.background = '#fff';
    }
  });
  var inp = document.getElementById('af-search-input');
  inp.placeholder = _afPlaceholders[typeVal] || 'Type to search…';
  inp.value = '';
  inp.focus();
  htmx.trigger(inp, 'af-type-changed');
}

function afClearType() {
  document.getElementById('af-holder-type').value = '';
  document.getElementById('af-search-section').style.display = 'none';
  document.getElementById('af-search-results').innerHTML = '';
  ['EMPLOYEE','MP','OFFICE','LOCATION'].forEach(function(t) {
    var btn = document.getElementById('af-btn-' + t);
    if (btn) { btn.style.borderColor = '#E5E7EB'; btn.style.background = '#fff'; }
  });
}

document.addEventListener('click', function(e) {
  var field = document.getElementById('assignee-field');
  var res = document.getElementById('af-search-results');
  if (field && res && !field.contains(e.target)) {
    res.style.display = 'none';
  }
});
document.addEventListener('focusin', function(e) {
  var inp = document.getElementById('af-search-input');
  var res = document.getElementById('af-search-results');
  if (inp && res && inp.contains(e.target)) {
    res.style.display = '';
  }
});
</script>
