<div class="panel-overlay">
  <div class="panel-backdrop" onclick="document.getElementById('panel-container').innerHTML=''"></div>
  <div class="panel-drawer" style="align-items:center;justify-content:center">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px;text-align:center;max-width:360px">
      <div style="width:64px;height:64px;border-radius:50%;background:#ECFDF5;display:flex;align-items:center;justify-content:center">
        <svg width="28" height="28" fill="none" stroke="#10B981" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="font-size:18px;font-weight:700;color:#212529">Asset Assigned</div>
      <div style="font-size:13.5px;color:#6C757D;line-height:1.6">
        <span class="asset-tag">{{ asset.asset_tag }}</span> has been successfully assigned to
        <strong style="color:#212529">{{ assignee.display_name }}</strong>.
      </div>
      <div style="padding:10px 16px;background:#F8F9FA;border-radius:6px;border:1px solid #E5E7EB;font-size:12.5px;color:#6C757D">
        A handover record has been created and the asset history updated.
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;width:100%">
        <button onclick="document.getElementById('panel-container').innerHTML=''"
                class="btn btn-outline" style="flex:1">Close</button>
        <a href="{% url 'assets:detail' asset.pk %}" class="btn btn-primary" style="flex:1">
          View Asset
        </a>
      </div>
    </div>
  </div>
</div>
