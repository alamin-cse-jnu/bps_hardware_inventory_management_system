{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Label — {{ asset.asset_tag }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Inter',sans-serif;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .label{width:220px;border:2px solid #006633;border-radius:10px;padding:16px;text-align:center;page-break-inside:avoid}
    .label img{width:160px;height:160px}
    .label-tag{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#006633;margin:8px 0 4px;letter-spacing:.04em}
    .label-model{font-size:11px;color:#495057;margin-bottom:2px}
    .label-brand{font-size:11px;color:#9CA3AF}
    .label-footer{font-size:9.5px;color:#9CA3AF;margin-top:8px;border-top:1px dashed #E5E7EB;padding-top:6px}
    .print-btn{margin-top:24px;display:flex;gap:10px}
    @media print{.print-btn{display:none}body{background:#fff}}
  </style>
</head>
<body>
  <div class="label">
    <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR Code for {{ asset.asset_tag }}">
    <div class="label-tag">{{ asset.asset_tag }}</div>
    <div class="label-model">{{ asset.brand }} {{ asset.model_name }}</div>
    <div class="label-brand">{{ asset.asset_type.name }}</div>
    <div class="label-footer">Parliament IT Inventory System</div>
  </div>

  <div class="print-btn">
    <button onclick="window.print()"
            style="height:38px;padding:0 20px;border:none;border-radius:4px;background:#006633;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">
      Print Label
    </button>
    <a href="{% url 'qrcodes:qr_download' asset.pk %}"
       style="height:38px;padding:0 20px;border:1px solid #E5E7EB;border-radius:4px;background:#fff;color:#495057;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;text-decoration:none">
      Download PNG
    </a>
    <a href="{% url 'assets:detail' asset.pk %}"
       style="height:38px;padding:0 20px;border:1px solid #E5E7EB;border-radius:4px;background:#fff;color:#495057;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;text-decoration:none">
      Back
    </a>
  </div>
</body>
</html>
