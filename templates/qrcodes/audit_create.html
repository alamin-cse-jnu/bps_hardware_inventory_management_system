{% extends "base.html" %}
{% block title %}New Audit Session{% endblock %}

{% block breadcrumb %}
  <a href="{% url 'assets:dashboard' %}">IT Inventory</a>
  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="opacity:.4"><polyline points="9 18 15 12 9 6"/></svg>
  <a href="{% url 'qrcodes:audit_list' %}">Audit Sessions</a>
  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="opacity:.4"><polyline points="9 18 15 12 9 6"/></svg>
  <strong>New Session</strong>
{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">New Audit Session</div>
</div>

<div style="max-width:520px">
  <div class="card">
    <div class="card-body">
      <form method="post" action="{% url 'qrcodes:audit_create' %}">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label">
            Scope / Location
            <span style="font-weight:400;color:#9CA3AF">(optional — leave blank for full inventory)</span>
          </label>
          <select name="location_id" class="form-input">
            <option value="">Full Inventory (all locations)</option>
            {% for loc in locations %}
            <option value="{{ loc.pk }}">{{ loc.full_path }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">
            Notes
            <span style="font-weight:400;color:#9CA3AF">(optional)</span>
          </label>
          <textarea name="note" rows="3" class="form-input"
                    placeholder="e.g. Annual physical inventory — 2nd floor offices"></textarea>
        </div>

        <div style="display:flex;gap:10px;margin-top:8px">
          <a href="{% url 'qrcodes:audit_list' %}" class="btn btn-outline" style="flex:1">Cancel</a>
          <button type="submit" class="btn btn-primary" style="flex:2">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Create Audit Session
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
