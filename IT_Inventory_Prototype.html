  const map = {

  const s = map[status] || map.IN_STOCK;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '2px 8px', borderRadius: 99, fontSize: 11, fontWeight: 600,

// Tiny bar chart using CSS
const MiniBar = ({ value, max, color }) =>
<div style={{ flex: 1, height: 6, background: C.border, borderRadius: 3, overflow: 'hidden' }}>
    <div style={{ width: `${Math.round(value / max * 100)}%`, height: '100%', background: color, borderRadius: 3, transition: 'width 600ms ease' }} />
  </div>;


// Donut chart via SVG
const DonutChart = ({ segments }) => {
  const r = 52,cx = 64,cy = 64,circumference = 2 * Math.PI * r;
  let offset = 0;
  const total = segments.reduce((s, seg) => s + seg.value, 0);
  return (
    <svg width={128} height={128} viewBox="0 0 128 128">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth={14} />
      {segments.map((seg, i) => {
        const dash = seg.value / total * circumference;
        const gap = circumference - dash;
        const el =
        <circle key={i} cx={cx} cy={cy} r={r} fill="none"
        stroke={seg.color} strokeWidth={14}
        strokeDasharray={`${dash} ${gap}`}
        strokeDashoffset={-offset}
        strokeLinecap="butt"
        style={{ transform: 'rotate(-90deg)', transformOrigin: '64px 64px' }} />;


        offset += dash;
        return el;
      })}
      <text x={cx} y={cy - 6} textAnchor="middle" fontSize={18} fontWeight={700} fill={C.text} fontFamily="Inter,sans-serif">3,247</text>
      <text x={cx} y={cy + 12} textAnchor="middle" fontSize={9} fill={C.textMuted} fontFamily="Inter,sans-serif">TOTAL</text>
    </svg>);

};

// ─────────────────────────────────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showErrorState": true,
  "density": "comfortable"
} /*EDITMODE-END*/;

const App = () => {
  const [screen, setScreen] = useState(() => localStorage.getItem('it_inv_screen') || 'login');
  const [activeNav, setActiveNav] = useState(() => localStorage.getItem('it_inv_nav') || 'assets');
  const [showAssignModal, setShowAssignModal] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {localStorage.setItem('it_inv_screen', screen);}, [screen]);
  useEffect(() => {localStorage.setItem('it_inv_nav', activeNav);}, [activeNav]);

  // Tweaks protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  if (screen === 'login') {
    return (
      <>
        <LoginScreen onLogin={() => setScreen('app')} showError={tweaks.showErrorState} />
        {showTweaks &&
        <div style={{ position: 'fixed', bottom: 20, right: 20, zIndex: 9999, background: C.white, border: `1px solid ${C.border}`, borderRadius: 6, padding: 16, minWidth: 220, boxShadow: '0 8px 24px rgba(0,0,0,0.12)' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 12, letterSpacing: '0.05em', textTransform: 'uppercase' }}>Tweaks</div>
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: C.textMid, cursor: 'pointer', marginBottom: 10 }}>
              <div onClick={() => updateTweak('showErrorState', !tweaks.showErrorState)} style={{ width: 16, height: 16, borderRadius: 3, border: `1.5px solid ${tweaks.showErrorState ? C.green : C.borderMid}`, background: tweaks.showErrorState ? C.green : C.white, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                {tweaks.showErrorState && <Icon name="check" size={10} color="white" strokeWidth={3} />}
              </div>
              Show error state
            </label>
            <button onClick={() => setScreen('app')} style={{ width: '100%', height: 30, background: C.green, color: 'white', border: 'none', borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
              Skip to App →
            </button>
          </div>
        }
      </>);

  }

  const renderScreen = () => {
    if (activeNav === 'dashboard') return <DashboardScreen onOpenAssign={() => setShowAssignModal(true)} />;
    if (activeNav === 'assets' && screen === 'asset-detail') return <AssetDetailScreen onBack={() => setScreen('app')} />;
    if (activeNav === 'assets') return <AssetListScreen onSelectAsset={() => setScreen('asset-detail')} />;
    if (activeNav === 'audit') return <HistorySearchScreen />;
    if (activeNav === 'transfers') return <BulkTransferScreen />;
    if (activeNav === 'lifecycle') return <InactiveHolderScreen />;
    if (activeNav === 'qr') return <QRScanScreen />;
    return <PlaceholderScreen label={NAV_ITEMS.find((n) => n.id === activeNav)?.label || 'Screen'} />;
  };

  return (
    <>
      <AppShell activeNav={activeNav} onNav={(id) => {setActiveNav(id);if (screen === 'asset-detail') setScreen('app');}} onLogout={() => setScreen('login')}>
        {renderScreen()}
      </AppShell>
      {showAssignModal && <AssignModal onClose={() => setShowAssignModal(false)} />}
      {showTweaks &&
      <div style={{ position: 'fixed', bottom: 20, right: 20, zIndex: 9999, background: C.white, border: `1px solid ${C.border}`, borderRadius: 6, padding: 16, minWidth: 220, boxShadow: '0 8px 24px rgba(0,0,0,0.12)' }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 12, letterSpacing: '0.05em', textTransform: 'uppercase' }}>Tweaks</div>
          <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8 }}>Navigate</div>
          {NAV_ITEMS.map((n) =>
        <button key={n.id} onClick={() => setActiveNav(n.id)} style={{ display: 'block', width: '100%', height: 28, marginBottom: 4, borderRadius: 4, border: `1px solid ${activeNav === n.id ? C.green : C.border}`, background: activeNav === n.id ? C.greenLight : C.white, color: activeNav === n.id ? C.green : C.textMid, fontSize: 12, fontWeight: activeNav === n.id ? 600 : 400, cursor: 'pointer', textAlign: 'left', padding: '0 10px' }}>{n.label}</button>
        )}
          <div style={{ height: 1, background: C.border, margin: '10px 0' }} />
          <button onClick={() => setScreen('login')} style={{ width: '100%', height: 28, background: C.bg, color: C.textMid, border: `1px solid ${C.border}`, borderRadius: 4, fontSize: 12, fontWeight: 500, cursor: 'pointer' }}>
            Back to Login
          </button>
        </div>
      }
    </>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
